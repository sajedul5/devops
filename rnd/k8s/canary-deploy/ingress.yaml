apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-canary-ingress
  namespace: app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/service-weights: |
      frontend: 90
      frontend-canary: 10
spec:
  ingressClassName: traefik
  rules:
  - host: app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80